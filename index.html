<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>천기누설 : 명운과 행운의 시각화</title>
<!-- 라이브러리 로드 -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;700;900&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<script>
    tailwind.config = {
        theme: {
            extend: {
                colors: {
                    primary: '#1A1B41',
                    secondary: '#7A5C91',
                    accent: '#D4AF37',
                    soft: '#F3E5D8',
                },
                fontFamily: {
                    serif: ['"Noto Serif KR"', 'serif'],
                    sans: ['"Noto Sans KR"', 'sans-serif'],
                },
                animation: {
                    'float-slow': 'float 6s ease-in-out infinite',
                },
                keyframes: {
                    float: {
                        '0%, 100%': { transform: 'translateY(0px)' },
                        '50%': { transform: 'translateY(-10px)' },
                    },
                    slot: {
                        '0%': { transform: 'translateY(-5px)', opacity: 0.5 },
                        '100%': { transform: 'translateY(5px)', opacity: 0.8 },
                    }
                }
            }
        }
    }
</script>
<style>
    * { -webkit-tap-highlight-color: transparent; scroll-behavior: smooth; }
    body {
        background-color: #1A1B41;
        color: #F3E5D8;
        background-image: 
            radial-gradient(circle at 50% 0%, rgba(122, 92, 145, 0.2) 0%, transparent 70%),
            radial-gradient(circle at 50% 100%, rgba(212, 175, 55, 0.1) 0%, transparent 70%);
        background-attachment: fixed;
        word-break: keep-all;
    }
    .glass-card {
        background: rgba(26, 27, 65, 0.85);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border: 1px solid rgba(212, 175, 55, 0.2);
    }
    .chart-box { position: relative; width: 100%; height: 300px; margin: 0 auto; }
    .lotto-ball {
        display: flex; align-items: center; justify-content: center;
        width: 2.8rem; height: 2.8rem; border-radius: 50%;
        background: radial-gradient(circle at 30% 30%, #F3E5D8 0%, #D4AF37 40%, #8B6508 100%);
        color: #1A1B41; font-weight: 900; font-size: 1.1rem;
        box-shadow: 0 3px 8px rgba(0,0,0,0.4);
    }
    .lotto-ball.rolling {
        animation: slot 0.12s linear infinite;
        background: radial-gradient(circle at 30% 30%, #4A4B71 0%, #1A1B41 100%);
        color: #D4AF37; box-shadow: none;
    }
    .input-field {
        background: rgba(10, 11, 30, 0.6);
        border: 1px solid rgba(212, 175, 55, 0.3);
        color: #F3E5D8;
        font-size: 16px !important;
        transition: all 0.3s ease;
    }
    .input-field:focus {
        border-color: #D4AF37;
        background: rgba(26, 27, 65, 0.9);
        box-shadow: 0 0 0 2px rgba(212, 175, 55, 0.2);
        outline: none;
    }
    .select-wrapper { position: relative; }
    .select-wrapper::after {
        content: '▼';
        position: absolute;
        right: 1rem;
        top: 50%;
        transform: translateY(-50%);
        color: #D4AF37;
        font-size: 0.7rem;
        pointer-events: none;
    }
    select option { background-color: #1A1B41; color: #F3E5D8; padding: 10px; }
</style>
</head>
<body class="font-sans antialiased min-h-screen relative overflow-x-hidden">

<div class="max-w-4xl mx-auto px-5 py-8 md:py-16 relative z-10">

    <header class="text-center mb-10 animate-float-slow">
        <p class="text-accent font-serif tracking-[0.2em] text-xs mb-2">✧ 천 기 누 설 ✧</p>
        <h1 class="text-3xl md:text-5xl font-serif font-black text-soft mb-4 tracking-tight">명운과 행운의 시각화</h1>
        <p class="text-soft/70 font-light text-sm md:text-lg leading-relaxed px-2">
            다가오는 <strong id="headerSaturday" class="text-accent underline underline-offset-4">토요일</strong>의 최적 번호를 도출합니다.
        </p>
    </header>

    <!-- [입력 단계] -->
    <section id="inputPortal" class="glass-card rounded-2xl p-6 md:p-10 transition-all duration-500">
        <div class="text-center mb-6">
            <h2 class="text-xl font-serif font-bold text-accent mb-1">운명의 정보 입력</h2>
            <p class="text-soft/50 text-xs font-light">정확한 생시를 입력할수록 분석이 정교해집니다.</p>
        </div>
        <form id="destinyForm" class="space-y-5">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label class="block text-[11px] font-bold text-accent/70 mb-1.5 uppercase tracking-wider">성함 (선택)</label>
                    <input type="text" id="inputName" class="input-field w-full px-4 py-3.5 rounded-xl placeholder-soft/20" placeholder="미입력시 '익명'으로 분석">
                </div>
                <div>
                    <label class="block text-[11px] font-bold text-accent/70 mb-1.5 uppercase tracking-wider">성별</label>
                    <div class="flex gap-3">
                        <label class="flex-1 flex items-center justify-center gap-2 cursor-pointer input-field py-3.5 rounded-xl"><input type="radio" name="gender" value="M" checked class="accent-accent"> <span class="text-sm">남성</span></label>
                        <label class="flex-1 flex items-center justify-center gap-2 cursor-pointer input-field py-3.5 rounded-xl"><input type="radio" name="gender" value="F" class="accent-accent"> <span class="text-sm">여성</span></label>
                    </div>
                </div>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label class="block text-[11px] font-bold text-accent/70 mb-1.5 uppercase tracking-wider">생년월일 (8자리)</label>
                    <input type="text" id="inputBirth" required maxlength="10" inputmode="numeric" class="input-field w-full px-4 py-3.5 rounded-xl placeholder-soft/20" placeholder="예: 19950512">
                </div>
                <div>
                    <label class="block text-[11px] font-bold text-accent/70 mb-1.5 uppercase tracking-wider">태어난 시 (Time)</label>
                    <div class="select-wrapper">
                        <select id="inputTime" class="input-field w-full px-4 py-3.5 rounded-xl appearance-none cursor-pointer font-medium">
                            <option value="unknown">태어난 시간 모름</option>
                            <option value="0">자시 (23:30 ~ 01:30)</option>
                            <option value="1">축시 (01:30 ~ 03:30)</option>
                            <option value="2">인시 (03:30 ~ 05:30)</option>
                            <option value="3">묘시 (05:30 ~ 07:30)</option>
                            <option value="4">진시 (07:30 ~ 09:30)</option>
                            <option value="5">사시 (09:30 ~ 11:30)</option>
                            <option value="6">오시 (11:30 ~ 13:30)</option>
                            <option value="7">미시 (13:30 ~ 15:30)</option>
                            <option value="8">신시 (15:30 ~ 17:30)</option>
                            <option value="9">유시 (17:30 ~ 19:30)</option>
                            <option value="10">술시 (19:30 ~ 21:30)</option>
                            <option value="11">해시 (21:30 ~ 23:30)</option>
                        </select>
                    </div>
                </div>
            </div>
            <button type="submit" id="submitBtn" class="w-full mt-4 bg-gradient-to-br from-accent to-[#b89848] text-primary font-bold text-lg py-4 rounded-xl active:scale-[0.98] transition-transform shadow-lg shadow-accent/20">분석 및 번호 생성 ☯</button>
        </form>
    </section>

    <div id="loadingState" class="hidden text-center py-16 flex-col items-center justify-center">
        <div class="text-5xl text-accent animate-spin mb-6" style="animation-duration: 3s;">☯</div>
        <h3 class="text-xl font-serif text-soft mb-2">운명의 흐름을 계산하는 중...</h3>
        <div class="max-w-[200px] w-full mx-auto h-[3px] bg-white/10 rounded-full mt-6 overflow-hidden">
            <div id="progressBar" class="h-full bg-accent transition-all duration-100 ease-linear" style="width: 0%"></div>
        </div>
    </div>

    <main id="dashboard" class="hidden opacity-0 transition-opacity duration-1000 space-y-6">
        <div class="text-center py-4 border-b border-accent/10">
            <h2 class="text-2xl font-serif font-bold text-soft"><span id="displayUser" class="text-accent"></span>님의 행운 보고서</h2>
            <p class="text-xs text-soft/50 mt-1 uppercase tracking-widest">Lucky Report for <span id="saturdayDate"></span></p>
        </div>

        <!-- [로또 번호 섹션] -->
        <section class="glass-card rounded-2xl p-6 text-center">
            <h3 class="text-lg font-serif font-bold text-accent mb-1">✨ 행운의 조합</h3>
            <p id="lottoStatusText" class="text-[11px] text-soft/40 mb-6 italic">번호 산출 중...</p>
            <div class="space-y-8">
                <div><p class="text-[10px] text-accent/40 font-bold mb-3 tracking-widest uppercase">Set A : 기운 보완형</p><div id="numberContainer1" class="flex flex-wrap justify-center gap-2.5"></div></div>
                <div class="pt-6 border-t border-white/5"><p class="text-[10px] text-accent/40 font-bold mb-3 tracking-widest uppercase">Set B : 기운 집중형</p><div id="numberContainer2" class="flex flex-wrap justify-center gap-2.5"></div></div>
            </div>
        </section>

        <div class="grid grid-cols-1 gap-6">
            <!-- [차트 섹션] -->
            <section class="glass-card rounded-2xl p-6">
                <h3 class="text-md font-serif font-bold text-accent mb-4 text-center">📊 오행(五行) 분석도</h3>
                <div class="chart-box">
                    <canvas id="sajuRadarChart"></canvas>
                </div>
            </section>
            
            <!-- [상세 해설 섹션 - 300자 내외로 조정됨] -->
            <section class="glass-card rounded-2xl p-6 md:p-8">
                <h3 class="text-md font-serif font-bold text-accent mb-6 flex items-center justify-center gap-2">
                    📖 <span class="targetSaturday"></span> 운세 심층 해설
                </h3>
                <div class="space-y-8" id="insightContainer">
                    <div class="insight-card p-6 rounded-2xl bg-white/[0.03] border border-white/5">
                        <h4 class="text-accent text-sm font-bold mb-4 flex items-center gap-2">
                            <span class="w-6 h-6 flex items-center justify-center bg-accent/20 rounded-full text-[10px]">🌟</span> 
                            타고난 성향과 오늘의 기운
                        </h4>
                        <div id="insight-total" class="text-soft/80 leading-relaxed text-[15px] text-justify space-y-4"></div>
                    </div>
                    <div class="insight-card p-6 rounded-2xl bg-white/[0.03] border border-white/5">
                        <h4 class="text-accent text-sm font-bold mb-4 flex items-center gap-2">
                            <span class="w-6 h-6 flex items-center justify-center bg-accent/20 rounded-full text-[10px]">💰</span> 
                            금전운과 행운의 타이밍
                        </h4>
                        <div id="insight-wealth" class="text-soft/80 leading-relaxed text-[15px] text-justify space-y-4"></div>
                    </div>
                    <div class="insight-card p-6 rounded-2xl bg-white/[0.03] border border-white/5">
                        <h4 class="text-accent text-sm font-bold mb-4 flex items-center gap-2">
                            <span class="w-6 h-6 flex items-center justify-center bg-accent/20 rounded-full text-[10px]">🍀</span> 
                            일상 속 행운 가이드
                        </h4>
                        <div id="insight-health" class="text-soft/80 leading-relaxed text-[15px] text-justify space-y-4"></div>
                    </div>
                </div>
            </section>
        </div>

        <div class="text-center pt-8 pb-4">
            <button onclick="resetInterface()" class="px-8 py-3 rounded-full border border-accent/30 text-accent font-medium text-sm hover:bg-accent/10 active:scale-95 transition-all">
                ← 다시 분석하기
            </button>
        </div>
    </main>
</div>

<script>
    let radarChartInstance = null;
    let currentUserSeed = 0;
    const ANIMATION_DURATION = 2000;

    function getUpcomingSaturday() {
        const today = new Date();
        const currentDay = today.getDay(); 
        let distanceToSaturday = 6 - currentDay;
        const targetDate = new Date(today);
        targetDate.setDate(today.getDate() + distanceToSaturday);
        return `${targetDate.getFullYear()}년 ${String(targetDate.getMonth() + 1).padStart(2, '0')}월 ${String(targetDate.getDate()).padStart(2, '0')}일`;
    }

    const nextSaturdayDate = getUpcomingSaturday();
    document.getElementById('headerSaturday').textContent = nextSaturdayDate;
    document.querySelectorAll('.targetSaturday').forEach(el => el.textContent = nextSaturdayDate);

    function mulberry32(a) {
        return function() {
          var t = a += 0x6D2B79F5; t = Math.imul(t ^ t >>> 15, t | 1);
          t ^= t + Math.imul(t ^ t >>> 7, t | 61); return ((t ^ t >>> 14) >>> 0) / 4294967296;
        }
    }

    function generateSeed(name, birth, time) {
        let str = name + birth + time; 
        let hash = 0;
        for (let i = 0; i < str.length; i++) { 
            hash = ((hash << 5) - hash) + str.charCodeAt(i); 
            hash |= 0; 
        }
        return Math.abs(hash);
    }

    document.getElementById('inputBirth').addEventListener('input', function(e) {
        let val = e.target.value.replace(/\D/g, "");
        if (val.length > 4 && val.length <= 6) {
            val = val.substring(0, 4) + "-" + val.substring(4);
        } else if (val.length > 6) {
            val = val.substring(0, 4) + "-" + val.substring(4, 6) + "-" + val.substring(6, 8);
        }
        e.target.value = val;
    });

    document.getElementById('destinyForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const nameInput = document.getElementById('inputName').value.trim();
        const name = nameInput || "익명";
        const birth = document.getElementById('inputBirth').value;
        const time = document.getElementById('inputTime').value;
        const digitsOnly = birth.replace(/\D/g, "");
        if(digitsOnly.length < 8) {
            alert("생년월일 8자리를 정확히 입력해주세요.");
            return;
        }
        const btn = document.getElementById('submitBtn');
        btn.disabled = true;
        btn.textContent = "우주의 기운을 모으는 중...";
        currentUserSeed = generateSeed(name, digitsOnly, time);
        const portal = document.getElementById('inputPortal');
        portal.classList.add('opacity-0', 'scale-95');
        setTimeout(() => {
            portal.style.display = 'none';
            document.getElementById('loadingState').classList.replace('hidden', 'flex');
            let start = null;
            function animate(t) {
                if(!start) start = t;
                const prog = t - start;
                const per = Math.min((prog/ANIMATION_DURATION)*100, 100);
                document.getElementById('progressBar').style.width = per + "%";
                if(prog < ANIMATION_DURATION) {
                    requestAnimationFrame(animate);
                } else { 
                    document.getElementById('loadingState').classList.replace('flex', 'hidden'); 
                    buildDashboard(name); 
                }
            }
            requestAnimationFrame(animate);
        }, 400);
    });

    function buildDashboard(name) {
        const dash = document.getElementById('dashboard');
        document.getElementById('displayUser').textContent = name;
        document.getElementById('saturdayDate').textContent = nextSaturdayDate;
        const rng = mulberry32(currentUserSeed);
        const sajuData = Array.from({length: 5}, () => Math.floor(rng() * 40) + 50);
        dash.classList.remove('hidden');
        setTimeout(() => {
            dash.classList.add('opacity-100');
            drawRadarChart(sajuData);
            startLottoRollingAnimation();
            writeInsights(name, rng);
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }, 100);
    }

    function drawRadarChart(data) {
        const ctx = document.getElementById('sajuRadarChart').getContext('2d');
        if (radarChartInstance) radarChartInstance.destroy();
        radarChartInstance = new Chart(ctx, {
            type: 'radar',
            data: {
                labels: ['목(木)', '화(火)', '토(土)', '금(金)', '수(水)'],
                datasets: [{
                    data: data,
                    backgroundColor: 'rgba(212, 175, 55, 0.2)',
                    borderColor: '#D4AF37',
                    borderWidth: 2,
                    pointBackgroundColor: '#D4AF37'
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: {
                    r: {
                        min: 0, max: 100, ticks: { display: false },
                        grid: { color: 'rgba(243, 229, 216, 0.1)' },
                        angleLines: { color: 'rgba(243, 229, 216, 0.1)' },
                        pointLabels: { color: '#F3E5D8', font: { size: 14 } }
                    }
                },
                plugins: { legend: { display: false } }
            }
        });
    }

    /**
     * 상세 운세 작성 함수 (각 항목당 300자 내외로 조정)
     */
    function writeInsights(name, rng) {
        const pick = (arr) => arr[Math.floor(rng() * arr.length)];
        
        // 1. 타고난 성향과 오늘의 기운 (종합운) - 약 300자
        const totalText = [
            `<p><strong>${name}님</strong>은 통찰력이 뛰어나며 결심한 바를 끝까지 완수하는 <strong>강인한 의지</strong>를 지니셨습니다. 명리학적 관점에서 오늘 ${name}님의 운세는 봄비에 싹을 틔우는 대지와 같아, 내면의 아이디어가 실질적 성과로 전환되는 중요한 기점에 서 있습니다.</p>`,
            `<p>현재 오행의 흐름상 '목(木)'과 '화(火)'의 조화가 두드러지며, 당신의 열정이 주변에 긍정적인 파급력을 미치게 됩니다. 이는 단순 성취를 넘어 조직 내에서 핵심적 역할을 수행하며 존경을 얻게 됨을 암시합니다. 완벽주의보다는 <strong>'여유와 수용'</strong>의 태도로 직관을 믿고 나아갈 때 더 큰 기회가 찾아올 것입니다.</p>`
        ].join("");

        // 2. 금전운과 행운의 타이밍 - 약 300자
        const wealthText = [
            `<p>재물운에 있어 오늘은 <strong>'수확의 기쁨'</strong>을 누리는 시기입니다. 그간의 신용과 노력이 물질적 보상으로 전환되는 흐름이 강합니다. 특히 주변 지인으로부터 전달되는 정보가 예상치 못한 수익의 발판이 될 수 있으니, 경청하는 자세가 행운의 열쇠가 될 것입니다.</p>`,
            `<p>다만 안정성을 기반으로 한 기운이므로 무리한 투자는 피하는 것이 좋습니다. 추천된 로또 번호는 당신의 선천적 기운과 금전운이 교차하는 지점에서 추출된 것이니 즐거운 마음으로 활용해 보세요. 오후 3시에서 7시 사이, 서쪽에서 오는 기운이 금전적 활력을 더해주어 풍요로운 흐름을 완성할 것입니다.</p>`
        ].join("");

        // 3. 일상 속 행운 가이드 - 약 300자
        const healthText = [
            `<p>오늘 ${name}님께 가장 필요한 에너지는 <strong>'물(水)'의 순환</strong>입니다. 아침의 미온수 한 잔과 명상은 창의적 에너지를 깨우는 활력소가 됩니다. 행운을 부르는 색상은 깊은 신뢰를 상징하는 <strong>네이비와 황금색</strong>이며, 작은 소품으로 포인트를 주는 것만으로도 나쁜 기운을 정화하고 길운을 유도할 수 있습니다.</p>`,
            `<p>식단으로는 제철 채소와 해산물을 추천하며, 자극적인 음식보다는 담백한 음식이 운을 맑게 유지해 줍니다. 잠들기 전 스스로에게 건네는 칭찬은 다음 날의 행운을 예약하는 강력한 주문이 됩니다. 우주는 이미 당신을 위해 최선의 선물을 준비하고 있으니 긍정적인 마음으로 주말의 기적을 맞이하십시오.</p>`
        ].join("");

        document.getElementById('insight-total').innerHTML = totalText;
        document.getElementById('insight-wealth').innerHTML = wealthText;
        document.getElementById('insight-health').innerHTML = healthText;
    }

    function startLottoRollingAnimation() {
        [document.getElementById('numberContainer1'), document.getElementById('numberContainer2')].forEach(c => {
            c.innerHTML = ''; 
            for(let i=0; i<6; i++) { 
                const b = document.createElement('div'); 
                b.className = 'lotto-ball rolling'; 
                b.textContent = '?'; 
                c.appendChild(b); 
            }
        });
        setTimeout(generateFinalNumbers, 1500);
    }

    function generateFinalNumbers() {
        const createSet = (off) => {
            const r = mulberry32(currentUserSeed + off); 
            const s = new Set();
            while(s.size < 6) s.add(Math.floor(r() * 45) + 1);
            return Array.from(s).sort((a,b)=>a-b);
        };
        const sets = [createSet(77), createSet(88)];
        [1, 2].forEach(idx => {
            const balls = document.getElementById(`numberContainer${idx}`).querySelectorAll('.lotto-ball');
            sets[idx-1].forEach((n, i) => {
                setTimeout(() => { 
                    balls[i].classList.remove('rolling'); 
                    balls[i].textContent = n; 
                }, i * 150);
            });
        });
        document.getElementById('lottoStatusText').textContent = "행운의 숫자 추출이 완료되었습니다.";
    }

    function resetInterface() {
        location.reload();
    }
</script>
